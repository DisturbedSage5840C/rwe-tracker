name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install lint/type dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt -r apps/nlp/requirements.txt
          pip install mypy
          cd frontend && npm ci

      - name: Ruff check
        run: ruff check apps/

      - name: Ruff format check (advisory)
        run: ruff format --check apps/ || true

      - name: Mypy strict
        run: mypy apps/api/ apps/nlp/ --strict

      - name: Frontend TypeScript
        run: cd frontend && npx tsc --noEmit

      - name: Frontend ESLint strict
        run: cd frontend && npx eslint . --max-warnings 0

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rwe_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rwe_tracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/rwe_tracker
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/rwe_tracker
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-with-minimum-32-characters
      NLP_SERVICE_URL: http://localhost:8001
      OPENAI_API_KEY: test-openai-key
      OPENFDA_BASE_URL: https://api.fda.gov
      JWT_ISSUER: rwe-tracker-api
      JWT_AUDIENCE: rwe-tracker-clients
      CORS_ALLOWED_ORIGINS: '["http://localhost:3000"]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt -r apps/nlp/requirements.txt

      - name: Run pytest with coverage gate
        run: pytest tests/ -x --cov=apps --cov-report=xml --cov-fail-under=50 -n auto

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Run vitest with coverage
        run: cd frontend && npx vitest run --coverage

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
          cd frontend && npm ci

      - name: Bandit (medium+ severity)
        run: bandit -r apps/ -ll

      - name: Safety dependency audit
        run: safety check -r apps/api/requirements.txt

      - name: Frontend critical npm audit
        run: cd frontend && npm audit --audit-level=critical
